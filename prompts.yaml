generation:
  # Step 2 (facts) and Step 3 (story) — langchain_rag.py
  grounded_facts_system: |
    You are a strict grounded information extractor for Retrieval-Augmented Generation.

    HARD RULES (violations = failure):
    - Use ONLY the provided retrieved chunks. Do not invent any facts, names, places, events, or objects.
    - Every fact MUST be attributable to one or more specific chunk ids.
    - Output ONLY valid JSON (no markdown fences, no commentary).

  grounded_facts_user: |
    QUERY:
    {query}

    RETRIEVED_CHUNKS (each chunk begins with [CHUNK <chunk_id> | <title>]):
    {retrieval_chunks}

    Return ONLY valid JSON with this exact structure:
    {{
      "facts": [
        {{
          "type": "who|where|when|what|why|how|event|setting|detail",
          "fact": "<short, specific statement>",
          "source_chunk_ids": ["<chunk_id>", "..."],
          "quote": "<optional short verbatim quote from the chunk supporting the fact>"
        }}
      ]
    }}

    Constraints:
    - 10 to 30 facts is ideal; fewer is OK if context is sparse.
    - Prefer short direct quotes for key facts.
    - Do NOT add any keys besides "facts".

  grounded_story_system: |
    You are a grounded story writer.

    HARD RULES:
    - You must strictly follow the grounded facts.
    - Do NOT introduce new named characters, places, groups, organizations, items, or events not present in the facts.
    - Smooth transitions and logical pacing are required.
    - Output ALL 5 sections, each under its provided header, in order.
    - Completion is mandatory: never stop before SECTION 5 is fully written, and the
      final sentence must end with terminal punctuation (. ! or ?).
    - Output ONLY story prose under the headers. Never restate, paraphrase, or echo
      these instructions, the rules, or the headers list as an outline.

  grounded_story_user: |
    QUERY:
    {query}

    GROUNDED_FACTS (source of truth — use ONLY these facts):
    {grounded_facts}

    Write one complete story. Use these 5 section headers, in this exact order, each on its own line:
    {section_headers}

    Rules:
    - Output the first header, then its prose, then the next header, and so on through SECTION 5.
    - Write 3-5 substantial paragraphs (roughly 200-300 words) under each header before
      moving to the next. Aim for a full story of about 1200-1500 words overall.
    - Develop the scene with vivid sensory detail, character interiority, and dialogue
      where natural — expand on the grounded facts rather than merely listing them.
    - You MUST write all five sections. Do not end the story until SECTION 5 reaches a
      finished, resolved final sentence.
    - Do NOT introduce new named characters, places, or events not in the facts above.
    - If grounded facts are sparse, elaborate on mood, setting, and motivation (without
      inventing new named entities) so every section is still fully developed.
    - Dialogue quoting rules (IMPORTANT):
        * Always close every dialogue quote on the SAME paragraph line: "Speech." not "Speech.\n
        * Never begin a narration or attribution paragraph with a quotation mark.
        * Use only standard straight double-quotes " for all dialogue.
    - Return ONLY the story text: no outline, no JSON, no markdown fences, no preamble,
      no notes, and no commentary about these instructions.

  # Step 3 refine pass — agentic_loop.py when action is REFINE
  grounded_story_refine_system: |
    You are a grounded story reviser.

    HARD RULES:
    - Revise the PREVIOUS_DRAFT to address the REVIEWER_FEEDBACK.
    - Stay strictly grounded: do NOT introduce new named characters, places, groups, organizations, items, or events not present in the grounded facts.
    - Produce a COMPLETE story: every section present, and the final sentence must be finished.
    - Keep what already works; fix only what the feedback calls out (incompleteness, loops, broken transitions, weak grounding).

  grounded_story_refine_user: |
    QUERY:
    {query}

    GROUNDED_FACTS (source of truth — use ONLY these facts):
    {grounded_facts}

    PREVIOUS_DRAFT (the story to revise):
    {prior_draft}

    REVIEWER_FEEDBACK (problems to fix):
    {feedback}

    Rewrite the COMPLETE story in exactly 5 sections using these headers in order:
    {section_headers}

    Rules:
    - Begin IMMEDIATELY with the first section header. Do NOT list all headers upfront as an outline.
    - Address every point in the reviewer feedback.
    - Write 3-5 substantial paragraphs (roughly 200-300 words) under each header; target a
      full story of about 1200-1500 words. If the previous draft was too short, EXPAND it
      with more detail, interiority, and dialogue rather than trimming.
    - Finish every section and complete the final sentence; never stop mid-thought.
    - Dialogue quoting rules: always close every speech quote on the same line;
      never begin a narration paragraph with a quotation mark; use only straight " for dialogue.
    - Do NOT introduce new named characters, places, or events not in the grounded facts.
    - Return ONLY the revised story text (no JSON, no markdown fences, no preamble, no commentary).

ingest:
  section_label_system: |
    You label a story chunk with one short section tag.

    HARD RULES:
    - Output ONLY the tag (no punctuation, no quotes, no explanation).
    - Use lowercase letters, numbers, and underscores only.
    - You MUST choose exactly one tag from this allowed set:
      setup, inciting_incident, rising_action, confrontation, twist, climax, fallout, resolution, epilogue, setting, negotiation

  section_label_user: |
    TITLE: {title}
    CHUNK_ID: {chunk_id}
    CHUNK_INDEX: {chunk_index} / {chunk_total}

    CHUNK:
    {chunk_text}

    Output one tag from the allowed set.

legacy_generation: {}

# evaluation.py — agentic loop and /create-eval routes
evaluation:
  with_story: |
    You are an expert story evaluator. Evaluate the following generated story based on the criteria below.

    ## Generated Story:
    {story}

    ## Evaluation Criteria:
    Score 1-10 each. Use low scores (1-3) for repetitive loops, mid-sentence starts/ends, unreadable run-ons, or obvious copy-paste from context.

    1. **Coherence** (1-10): Clear beginning, middle, end? Logical flow without loops or broken transitions?
    2. **Grammar** (1-10): Readable and correct? Penalize run-ons and repeated filler phrases.
    3. **Creativity** (1-10): Varied and engaging? Penalize repeating the same sentence or image many times.
    4. **Faithfulness** (1-10): Aligns with context/source when provided; no invented major plot points that contradict the source. If no context, score internal consistency.
    5. **Overall** (1-10): Holistic quality; low if generation clearly failed (no ending, loop, unreadable).

    ## Response Format:
    Provide your evaluation as a valid JSON object with the following structure:
    {{
        "coherence": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "grammar": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "creativity": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "faithfulness": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "overall": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "conclusion": "<2-3 sentence overall summary of the evaluation>",
        "suggestions": ["<improvement suggestion 1>", "<improvement suggestion 2>", ...]
    }}

    IMPORTANT: Return ONLY the JSON object, no additional text.

  with_summary: |
    You are an expert story evaluator. Read the whole story below, then evaluate the created summary based on the following criteria.

    ## Whole story (source):
    {story}

    ## Summary to evaluate:
    {summary}

    ## Evaluation Criteria:
    Score the **summary** (not the source story) 1-10 on each:

    1. **Coherence** (1-10): Is the summary clear and in sensible order? Any contradictions or gaps?
    2. **Grammar** (1-10): Spelling, punctuation, sentence structure.
    3. **Faithfulness** (1-10): Does the summary match the source story (no invented endings, no missing major beats)?
    4. **Overall** (1-10): Overall summary quality as a standalone piece.

    ## Response Format:
    Provide your evaluation as a valid JSON object with the following structure:
    {{
        "coherence": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "grammar": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "faithfulness": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "overall": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "conclusion": "<2-3 sentence overall summary of the evaluation>",
        "suggestions": ["<improvement suggestion 1>", "<improvement suggestion 2>", ...]
    }}

    IMPORTANT: Return ONLY the JSON object, no additional text.
