generation:
  # Step 2 facts + Step 3 story prompts
  grounded_facts_system: |
    You extract grounded facts for RAG.
    Use only the provided chunks.
    Do not invent names, places, events, or objects.
    Every fact must include source chunk ids.
    Output only valid JSON.

  grounded_facts_user: |
    QUERY:
    {query}

    RETRIEVED_CHUNKS:
    {retrieval_chunks}

    Return only valid JSON in this structure:
    {{
      "facts": [
        {{
          "type": "who|where|when|what|why|how|event|setting|detail",
          "fact": "<short, specific statement>",
          "source_chunk_ids": ["<chunk_id>", "..."],
          "quote": "<optional short verbatim quote from the chunk supporting the fact>"
        }}
      ]
    }}

    Rules:
    - Target 10 to 30 facts when possible.
    - Use short direct quotes for important facts.
    - Do not add keys other than "facts".

  grounded_story_system: |
    You are a grounded story writer.
    Follow grounded facts strictly.
    Do NOT introduce new named characters, places, groups, organizations, items, or events not present in the facts.
    Output all 5 sections in order, using the given headers.
    Finish SECTION 5 fully, and end with terminal punctuation.
    Output only story prose under headers.

  grounded_story_user: |
    QUERY:
    {query}

    GROUNDED_FACTS:
    {grounded_facts}

    Write one complete story. Use these 5 section headers, in this exact order, each on its own line:
    {section_headers}

    Rules:
    - Output the first header, then its prose, then the next header, and so on through SECTION 5.
    - Keep it simple: clear prose under each header, not an outline.
    - EACH section MUST contain at least 3 complete sentences before moving to the next section.
    - Prefer 3-6 sentences per section.
    - Expand grounded facts with clear detail, pacing, and dialogue where natural.
    - You MUST write all five sections. Do not end the story until SECTION 5 reaches a
      finished, resolved final sentence.
    - Do NOT introduce new named characters, places, or events not in the facts above.
    - If facts are sparse, deepen mood, setting, and motivation without inventing new named entities.
    - Dialogue rules:
        * Always close dialogue on the same line.
        * Never start narration paragraphs with a quote mark.
        * Use straight double quotes " for dialogue.
    - Return only story text (no outline, no JSON, no markdown, no commentary).

  # Step 3 refine pass (agentic loop)
  grounded_story_refine_system: |
    You are a grounded story reviser.
    Revise the PREVIOUS_DRAFT using REVIEWER_FEEDBACK.
    Stay strictly grounded: do NOT introduce new named characters, places, groups, organizations, items, or events not present in the grounded facts.
    Keep what works and fix only requested issues.
    Return a complete story with all sections and a finished ending sentence.
    - Preserve finished sections when possible and continue from the earliest incomplete section instead of restarting from scratch.

  grounded_story_refine_user: |
    QUERY:
    {query}

    GROUNDED_FACTS:
    {grounded_facts}

    PREVIOUS_DRAFT:
    {prior_draft}

    REVIEWER_FEEDBACK:
    {feedback}

    Rewrite the COMPLETE story in exactly 5 sections using these headers in order:
    {section_headers}

    Rules:
    - Begin with the first section header. Do not print all headers as an outline.
    - Address every point in the reviewer feedback.
    - Keep the format simple: prose under each header.
    - EACH section MUST contain at least 3 complete sentences; expand any section that is shorter.
    - If the draft is incomplete, prioritize completing missing/weak sections while preserving valid grounded content from earlier sections.
    - If the previous draft is short, expand with detail and dialogue instead of trimming.
    - Finish every section and complete the final sentence.
    - Dialogue rules: close quotes on the same line, do not start narration with quotes, use straight " only.
    - Do NOT introduce new named characters, places, or events not in the grounded facts.
    - Return only revised story text (no JSON, no markdown, no commentary).

ingest:
  section_label_system: |
    Label a story chunk with one section tag.
    Output only the tag (no punctuation, quotes, or explanation).
    - Use lowercase letters, numbers, and underscores only.
    - Choose exactly one tag from:
      setup, inciting_incident, rising_action, confrontation, twist, climax, fallout, resolution, epilogue, setting, negotiation

  section_label_user: |
    TITLE: {title}
    CHUNK_ID: {chunk_id}
    CHUNK_INDEX: {chunk_index} / {chunk_total}

    CHUNK:
    {chunk_text}

    Output one tag from the allowed set.

legacy_generation: {}

# evaluation prompts
evaluation:
  with_story: |
    You are an expert story evaluator. Score the generated story with the criteria below.

    ## Generated Story:
    {story}

    ## Evaluation Criteria:
    Score each item from 1-10.
    Use low scores (1-3) for loops, broken sentences, unreadable run-ons, or obvious copy-paste.

    1. **Coherence** (1-10): Clear beginning, middle, end? Logical flow without loops or broken transitions?
    2. **Grammar** (1-10): Readable and correct? Penalize run-ons and repeated filler phrases.
    3. **Creativity** (1-10): Varied and engaging? Penalize repeating the same sentence or image many times.
    4. **Faithfulness** (1-10): Aligns with context/source when provided; no invented major plot points that contradict the source. If no context, score internal consistency.
    5. **Overall** (1-10): Holistic quality; low if generation clearly failed (no ending, loop, unreadable).

    ## Response Format:
    Return valid JSON in this structure:
    {{
        "coherence": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "grammar": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "creativity": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "faithfulness": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "overall": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "conclusion": "<2-3 sentence overall summary of the evaluation>",
        "suggestions": ["<improvement suggestion 1>", "<improvement suggestion 2>", ...]
    }}

    Return only the JSON object.

  with_summary: |
    You are an expert story evaluator. Read the full story, then evaluate the summary.

    ## Whole story (source):
    {story}

    ## Summary to evaluate:
    {summary}

    ## Evaluation Criteria:
    Score the summary (not the source story) from 1-10 on each item:

    1. **Coherence** (1-10): Is the summary clear and in sensible order? Any contradictions or gaps?
    2. **Grammar** (1-10): Spelling, punctuation, sentence structure.
    3. **Faithfulness** (1-10): Does the summary match the source story (no invented endings, no missing major beats)?
    4. **Overall** (1-10): Overall summary quality as a standalone piece.

    ## Response Format:
    Return valid JSON in this structure:
    {{
        "coherence": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "grammar": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "faithfulness": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "overall": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "conclusion": "<2-3 sentence overall summary of the evaluation>",
        "suggestions": ["<improvement suggestion 1>", "<improvement suggestion 2>", ...]
    }}

    Return only the JSON object.
