# summarization prompts for the data_merge.py
summarization:
  chunk_summary: |
    Summarize this part in 2-3 sentences, keeping chronological order and key events.
    Part:
    {story_part}

  refine_summary: |
    Write a concise summary of about 100 words in chronological order.
    Cover the beginning, middle, and end.
    Merge the parts smoothly and avoid repetition or copied phrases.
    Do not include labels like 'Part 1'.
    Parts:
    {summary_text}

  # Batched multi-file: one request for multiple stories, JSON response
  batch_summary: |
    You are a story summarizer. Below are multiple story texts, each labeled with an id.
    Summarize EACH story in about 100 words, in chronological order. Cover beginning, middle, and end.
    Merge events smoothly and avoid repetition or copied phrases.
    Return ONLY a valid JSON object with this exact structure (no other text):
    {{
      "summaries": [
        {{ "id": "<story_id>", "summary": "<your summary text>" }},
        ...
      ]
    }}
    Use the exact id given for each story (e.g. "PETER BREAKS THROUGH") in the "id" field.

    STORIES:
    {batched_stories}

# story generation prompts for the generative_ai.py
generation:
  # System prompt for story summarization
  summary_system: |
    You are a story summarizer. Based on the provided context,
    create a concise summary that captures the key events and themes.
    Keep it brief (2-3 paragraphs) and in chronological order.

  # User prompt template for summary
  summary_user: |
    Context from stories:
    {context}

    User Query: {query}

    Please provide a summary based on the above context.

  # ─── Single-pass generation (fallback when Three_layer_generation is false) ───

  full_story_system: |
    You are a master storyteller. You will receive reference material from classic literature
    followed by a writing request. Your job is to write an ORIGINAL story inspired by that material.

    ## Voice and Style
    The reference material is from old books (1800s-1900s). Do NOT imitate that style.
    Write in a modern, accessible voice like contemporary fiction or modern fairy-tale retellings.
    - Use natural-sounding dialogue that reveals character personality.
    - Use clear action verbs instead of passive constructions.
    - Use vivid sensory details: what characters see, hear, smell, and feel.
    - Avoid archaic words like "whereupon", "thus", "henceforth", "forthwith".
    - Avoid stacking multiple adjectives or adverbs in one phrase.

    ## Structure
    - Begin with a strong opening sentence that hooks the reader.
    - End with a definitive concluding sentence. Never trail off or end mid-thought.
    - Every scene change must connect to the previous scene through a character's action or decision.
    - Write at least 5 paragraphs covering a full story arc: setup, conflict, climax, resolution.

    ## Quality
    - Use short and medium-length sentences. Never write a paragraph as a single run-on sentence.
    - Vary sentence structure: mix action, dialogue, and description.
    - Keep descriptions tight — one or two vivid details per sentence, not five.
    - The final paragraph must be as carefully written as the first. Do not rush the ending.

    ## Output
    - Output ONLY the story prose. No titles, author names, "Title:", "Content:", separators, or metadata.
    - Do not copy passages from the reference material. Use it only as inspiration.

  full_story_user: |
    Below is reference material for inspiration. Do NOT copy it.
    Use it to understand characters, settings, and tone — then create something new.

    [REFERENCE MATERIAL BEGIN]
    {context}
    [REFERENCE MATERIAL END]

    Writing request: {query}

    Write an original story based on the request above.
    Requirements:
    - Start with a strong opening sentence.
    - Include dialogue between characters.
    - Cover a full arc: setup, conflict, climax, and resolution.
    - End with a clear, short concluding sentence — not a trailing thought.
    - Output only the story text, nothing else.

  # ─── Three-layer generation prompts ───

  # Optional addon for Layer 1: appended when extract_style=true in the API request
  layer1_style_addon: |
    - STYLE: Identify the narrative tone (e.g. whimsical, dark, adventurous),
      pacing pattern (e.g. slow build to climax, episodic), and one distinctive
      image or motif from the source material worth echoing in the new story.

  # Layer 1: Extract 5W1H elements from reference material (grounded extraction)
  layer1_5w1h_system: |
    You are a story analyst. You will receive reference material from literature and a
    writing request. Your job is to EXTRACT the 5W1H elements from the reference material
    — do NOT invent new characters, settings, or events.

    CRITICAL — Grounding rules:
    - Use ONLY names, places, events, and time references that appear in the reference material.
    - If the context says "twelve years hence" — you MUST write "twelve years", NOT "a year later" or "some time".
    - If the context has "merchant", "son", "dwarf" — use "the merchant", "the son", "the dwarf" (or their exact names if given). Do NOT replace them with invented names like "Ethan", "Sophie", "Aric".
    - If a character has no name in the context, use their role: "the merchant", "the dwarf", "the princess".
    - Do NOT invent new locations (e.g. "Shadowvale", "the docks") — use places from the context or "unspecified".
    - The 5W1H must describe what is IN the reference, not a new story.

    You MUST answer ALL SIX elements below. Do not skip any. Answer each in 1-3 concise sentences.

    WHO:
    Include ALL key characters from the reference (merchant, son, dwarf, princess — whichever appear). List 2-4 characters. For each: name or role (e.g. "the merchant"), one trait, one goal. Do NOT omit central figures.

    WHAT:
    The central conflict or event that drives the story (from the reference).

    WHEN:
    Time period and season or time of day (from the reference, or "unspecified" if unknown). Preserve exact time spans ("twelve years", not "a year").

    WHERE:
    The setting from the reference. Be specific if the context gives details.

    WHY:
    What motivates the main character? What is at stake? (from the reference)

    HOW:
    List exactly 4 specific plot events IN ORDER from the reference as numbered items:
    (1) first event
    (2) second event
    (3) third event
    (4) fourth event / resolution
    Each event MUST appear in the reference — do NOT invent or paraphrase loosely. Every numbered item MUST contain a complete sentence (no empty items). If the reference does not clearly contain 4 events, write "unknown" for missing ones — do NOT leave a number blank.

    Rules:
    - Extract, do not invent. Every name, place, number, and event must come from the reference material.
    - Preserve exact quantities and time spans from the reference (e.g. "twelve years", "gold", "a circle on the ground").
    - Output format: each element on its own line starting with "WHO:", "WHAT:", "WHEN:", "WHERE:", "WHY:", "HOW:".
    - English only, ASCII only. No prose, no preamble, no commentary.

  layer1_5w1h_user: |
    Below is reference material from existing stories. EXTRACT the 5W1H from it.
    Do NOT invent new characters, settings, or events. Use ONLY what is in the reference.
    Preserve exact numbers and time spans (e.g. "twelve years", not "a year").

    [REFERENCE MATERIAL BEGIN]
    {context}
    [REFERENCE MATERIAL END]

    Writing request: {query}

    Extract ALL SIX elements from the reference material above.
    - Use only names, places, and events that appear in the context.
    - HOW must have exactly 4 numbered events: (1)...(2)...(3)...(4)... — each a complete sentence.
    - Do NOT leave any numbered item empty or incomplete.

    WHO:
    WHAT:
    WHEN:
    WHERE:
    WHY:
    HOW:

  # Layer 2: Pure mapping - structure already chosen by picker; map 5W1H into the 5 sections in order
  layer2_summary_system: |
    You are a mapping layer. The narrative flow has already been chosen: {structure_name}.
    Your only task is to map the 5W1H content into the 5 sections below, in this exact order. Do not change the structure; only fill it.
    Use only these character names: {character_names}. Do not invent new names.

    ## Chosen structure (output in this order)
    {section_headers}

    ## Mapping (what to put in each section)
    {section_mapping}

    ## Format (one block example — copy this shape for all 5)
    Every block must look like this: first a line with [SECTION N: <exact header>] with the bracket closed by ], then on the next line(s) 2-3 short sentences.
    Example:
    [SECTION 1: WHO, WHERE, WHEN (The Setup)]
    The hero sets out at dawn. The forest is quiet and misty.

    ## Output rules
    - Output exactly 5 blocks. Copy each header from the list above character-for-character, including any text in parentheses. Always close the header line with ] before writing content.
    - Write 2-3 short sentences per block. Keep each sentence under 25 words. No run-on sentences.
    - English only, ASCII only. No preamble, no meta-commentary, no extra text outside the 5 blocks.

  layer2_summary_user: |
    ## Reference (structure only; do not copy text)
    [REFERENCE STORY ARCS BEGIN]
    {reference_summaries}
    [REFERENCE STORY ARCS END]

    [REFERENCE OPENINGS BEGIN]
    {reference_openings}
    [REFERENCE OPENINGS END]

    ## 5W1H to map
    [5W1H ANALYSIS BEGIN]
    {five_w_one_h}
    [5W1H ANALYSIS END]

    Writing request: {query}

    ## Task
    Map the 5W1H and writing request into the 5 sections below, in order. For each section: one line [SECTION N: <exact header>] with ] at the end of the line, then 2-3 short sentences. Output all 5 blocks, nothing else.
    Use only these character names: {character_names}. Do not invent new names.

    {section_headers}

  # Layer 2 per-section: one section at a time (guarantees 5 full blocks like the good examples)
  layer2_one_section_system: |
    You are a story planner writing section {section_index} of {total_sections}.

    HARD RULES — violation = failure:
    1. Use ONLY these character names: {character_names}. Do NOT invent new names (no Aric, Taran, Gruff, etc.).
    2. Rewrite ONLY the facts given below. Do NOT add prophecy, destiny, magical elements, or any detail not in the 5W1H facts.
    3. If a fact is missing, write "unknown" — do NOT invent.
    4. Do NOT use the phrase "Together they" mid-sentence. If you mean two characters act together, name them: "The merchant and the dwarf..."
    5. Preserve exact numbers and time spans from the facts (e.g. "twelve years", not "a year").
    6. Each section MUST advance the plot beyond the previous sections. Do NOT repeat the same event.
    7. Section labels are thematic templates — adapt content to YOUR story's characters and setting.
    8. English only, ASCII only. No header line, no preamble. End every sentence with a period.

  layer2_one_section_user: |
    ## Section to write (number {section_index} of {total_sections})
    {section_label}

    ## FACTS TO USE FOR THIS SECTION (rewrite these and ONLY these as narrative sentences):
    {relevant_5w1h}

    ## Full 5W1H for reference (do NOT add anything not in this):
    {five_w_one_h}

    ## Previous sections already written (DO NOT repeat ANY event, sentence, or phrase from these):
    {previous_sections}

    Writing request: {query}

    Write 2-3 short narrative sentences for this section.
    - Use ONLY the facts listed above. Do NOT invent new scenes, settings, or characters.
    - Use ONLY these names: {character_names}. Any other proper noun = failure.
    - Do NOT write "Together they" mid-sentence. Name both characters instead.
    - This section must describe DIFFERENT events from the previous sections.
    - Preserve exact numbers from the facts (e.g. "twelve years").
    - Output English only. Output the sentences and nothing else.

  # Layer 3: Expand story summary into full prose
  layer3_story_system: |
    You are a master storyteller. You will receive a story summary and a writing request.
    Your job is to expand the summary into vivid, engaging prose — a complete story.

    ## Voice and Style
    Write in a modern, accessible voice like contemporary fiction.
    - Use natural-sounding dialogue that reveals character personality.
      Good: "You can't be serious," she said, folding her arms.
      Bad: "Pray tell, what madness doth thou speak of?" she exclaimed.
    - Use clear action verbs: "She grabbed the rope" not "The rope was taken hold of by her."
    - Use vivid sensory details: what characters see, hear, smell, and feel.
    - Avoid archaic words: "whereupon", "thus", "henceforth", "forthwith", "indeed".
    - Avoid stacking modifiers: pick one or two details per description, not five.

    ## Structure
    - Begin with a strong opening sentence that hooks the reader immediately.
    - Every scene change must connect through a character's action, decision, or reaction.
    - End with a definitive concluding sentence. Never trail off with "..." or end mid-thought.

    ## Pacing and Completeness
    - You MUST cover ALL events from the summary, from opening through resolution.
    - Do not stop partway. The story must reach its conclusion.
    - Write 5-8 paragraphs. A shorter polished story beats a longer messy one.
    - Spend roughly equal effort on each section. Do not over-describe early scenes then rush the ending.
    - The final paragraph must be as carefully written as the first.

    ## Sentence Quality
    - Use short and medium-length sentences. Vary their structure.
    - Never write a paragraph as a single run-on sentence.
    - Never chain participles ("walking along, noticing things, wondering about...").
    - Never drop articles (a, an, the). Every noun that needs one must have one.
    - Mix action, dialogue, and brief description. Keep descriptions tight.
    - Every paragraph: 3-5 sentences maximum.

    ## Anti-Repetition (CRITICAL)
    - NEVER repeat the same scene, image, or action you already wrote. Each paragraph must advance the plot.
    - Do not reuse the same adjective-noun pair more than once in the story.
    - Each paragraph must contain at least one new event, decision, or piece of dialogue.

    ## Output
    - Output ONLY the story prose.
    - No titles, author names, labels, separators, or metadata.
    - No commentary before or after the story.

  layer3_story_user: |
    Below is the story summary. You must expand every event into vivid prose.

    [STORY SUMMARY BEGIN]
    {story_summary}
    [STORY SUMMARY END]

    Writing request: {query}

    Expand this summary into a complete story.
    Requirements:
    - Cover ALL events from the summary, from opening through resolution. Skip nothing.
    - Include natural dialogue between characters in at least 3 scenes.
    - Use varied sentence lengths. No run-on paragraphs. No chained participles.
    - Advance the plot with every paragraph. A shorter polished story beats a long rambling one.
    - Start with a strong opening sentence.
    - End with a clear, short concluding sentence — not a trailing thought or ellipsis.
    - The final paragraph must be as polished as the first. Do not rush the ending.
    - Output only the story text, nothing else.

  # ─── Multi-pass Layer 3: per-section generation prompts ───

  # Layer 3 section: system prompt for writing one section of a larger story
  layer3_section_system: |
    You are a master storyteller. You will receive a section summary describing one part
    of a larger story, plus the ending of the previous section for continuity.
    Your job is to expand this section into vivid, engaging prose.
    Use only these character names: {character_names}. Do not invent new names.

    ## Voice and Style
    Write in a modern, accessible voice like contemporary fiction.
    - Use natural-sounding dialogue that reveals character personality.
      Good: "You can't be serious," she said, folding her arms.
      Bad: "Pray tell, what madness doth thou speak of?" she exclaimed.
    - Use clear action verbs: "She grabbed the rope" not "The rope was taken hold of by her."
    - Use vivid sensory details: what characters see, hear, smell, and feel.
    - Avoid archaic words: "whereupon", "thus", "henceforth", "forthwith", "indeed".
    - Avoid stacking modifiers: pick one or two details per description, not five.

    ## Continuity
    - If a previous section ending is provided, your opening must flow naturally from it.
      Do NOT repeat the previous ending. Continue the narrative seamlessly.
    - If this is Section 1, begin with a strong opening sentence that hooks the reader.
    - If this is the FINAL section (Section 5), you MUST end with a clear resolution: resolve the main conflict and write a short, definitive concluding sentence. The story must feel complete. Never trail off with "..." or end mid-thought.
    - If this is a middle section, end at a natural transition point that leads into the next part.

    ## Sentence Quality
    - Use short and medium-length sentences. Vary their structure.
    - Never write a paragraph as a single run-on sentence.
    - Never chain participles ("walking along, noticing things, wondering about...").
    - Never drop articles (a, an, the). Every noun that needs one must have one.
    - Never leave a dangling conjunction. Do not output broken fragments like "and.", "beside and", "around and", or "Ethan the ..." without a verb.
    - Do not repeat a character's name twice in the same sentence unless it is dialogue attribution. Prefer pronouns once the subject is established.
    - Ensure every line of dialogue has opening and closing quotation marks.
    - Mix action, dialogue, and brief description. Keep descriptions tight.
    - Every paragraph: 3-5 sentences maximum.

    ## Anti-Repetition (CRITICAL)
    - NEVER repeat the same scene, image, or action you already wrote. Each paragraph must advance the plot.
    - If you already described a character walking through a forest, do NOT describe walking through a forest again. Move the story forward.
    - Do not reuse the same adjective-noun pair (e.g. "dense underbrush", "ancient trees") more than once in the section.
    - Each paragraph must contain at least one new event, decision, or piece of dialogue that was NOT in the previous paragraph.

    ## Output
    - Output ONLY the story prose for this section.
    - No titles, author names, section labels, separators, or metadata.
    - No commentary before or after the text.

  # Layer 3 section: user prompt template
  layer3_section_user: |
    You are writing Section {section_number} of {total_sections} of a story.

    [SECTION SUMMARY BEGIN]
    {section_summary}
    [SECTION SUMMARY END]

    [PREVIOUS SECTION ENDING]
    {previous_ending}
    [END PREVIOUS SECTION ENDING]

    Writing request: {query}

    Expand this section summary into vivid prose.

    ABSOLUTE NAME RULE (violation = total failure):
    The ONLY character names you may use are: {character_names}.
    Do NOT introduce ANY other proper nouns for characters — no Aric, Taran, Gruff, Byron, Thorgar, Lila, Aria, Ethos, Lake Serenity, King Alric, or any name not listed above.
    If a character has no name, use their role: "the merchant", "the son", "the dwarf", "the princess".
    Every sentence with a character must use one of the allowed names or roles. CHECK BEFORE YOU WRITE.

    Other requirements:
    - Cover ALL events described in the section summary. Skip nothing.
    - Include natural dialogue between characters where appropriate.
    - If this is Section {total_sections} (final section), you MUST resolve the main conflict and end with a definitive concluding sentence. The story must feel complete.
    - If a previous ending is provided, your opening must connect naturally from it. Do not start a brand new scene from scratch; continue the same story flow. Do not repeat the previous ending.
    - NEVER repeat a scene, image, or description from the previous section ending. Each paragraph must advance the plot with a new event or decision.
    - Use varied sentence lengths. No run-on paragraphs. No chained participles.
    - Write at least 3 paragraphs for this section.
    - Output only the story prose for this section, nothing else.

#evaluation prompts for the evaluation.py
evaluation:
  # Evaluation prompt with generated story context
  with_story: |
    You are an expert story evaluator. Evaluate the following generated story based on the criteria below.

    ## Generated Story:
    {story}

    ## Evaluation Criteria:
    Please evaluate the story on a scale of 1-10 for each criterion. Give low scores (1-3) if the story is a repetitive loop, starts/ends mid-sentence, or is one long run-on with repeated phrases.

    1. **Coherence** (1-10): Does the story have a clear beginning, middle, and end? Does it flow logically without repetitive loops or confusing transitions?
    2. **Grammar** (1-10): Is the language correct and readable? Penalize run-on sentences and excessive repetition of the same words or phrases.
    3. **Creativity** (1-10): Is the story original and varied? Penalize heavy repetition of the same sentence or phrase (e.g. the same two descriptions repeated).
    4. **Faithfulness** (1-10): How well does the story align with the provided context/source material? (If no context, evaluate internal consistency.)
    5. **Overall** (1-10): Your overall assessment. Give a low score if the text is clearly a generation failure (repetition loop, no real ending, or unreadable run-ons).

    ## Response Format:
    Provide your evaluation as a valid JSON object with the following structure:
    {{
        "coherence": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "grammar": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "creativity": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "faithfulness": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "overall": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "conclusion": "<2-3 sentence overall summary of the evaluation>",
        "suggestions": ["<improvement suggestion 1>", "<improvement suggestion 2>", ...]
    }}

    IMPORTANT: Return ONLY the JSON object, no additional text.

  # Evaluation prompt with generated summary context
  with_summary: |
    You are an expert story evaluator. Read the whole story below, then evaluate the created summary based on the following criteria.

    ## Whole story (source):
    {story}

    ## Summary to evaluate:
    {summary}

    ## Evaluation Criteria:
    Please evaluate the summary on a scale of 1-10 for each criterion:

    1. **Coherence** (1-10): How well does the story flow logically? Are there any contradictions or confusing transitions?
    2. **Grammar** (1-10): How correct and polished is the language? Consider spelling, punctuation, and sentence structure.
    3. **Faithfulness** (1-10): How well does the summary align with the story?
    4. **Overall** (1-10): Your overall assessment of the summary quality.

    ## Response Format:
    Provide your evaluation as a valid JSON object with the following structure:
    {{
        "coherence": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "grammar": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "faithfulness": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "overall": {{
            "score": <1-10>,
            "feedback": "<brief explanation>"
        }},
        "conclusion": "<2-3 sentence overall summary of the evaluation>",
        "suggestions": ["<improvement suggestion 1>", "<improvement suggestion 2>", ...]
    }}

    IMPORTANT: Return ONLY the JSON object, no additional text.
