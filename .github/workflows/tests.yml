name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  lightweight-tests:
    name: Lightweight pytest suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml requests fastapi httpx ruff

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest
